name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality:
    name: Lint and formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run Ruff lint
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          version: "0.15.22"
          args: check --output-format=github --select=E4,E7,E9,F,B --ignore=B905
          src: |
            app.py
            evaluation
            offline_inference
            tests

      - name: Check Ruff formatting
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          version: "0.15.22"
          args: format --check
          src: |
            app.py
            evaluation
            offline_inference
            tests

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run tests without external services
        env:
          USE_MOCK: "true"
        run: >-
          pytest -m "not integration" --strict-markers -ra
          --junitxml=test-results.xml

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ml-test-results
          path: test-results.xml
          if-no-files-found: warn
          retention-days: 7

  build:
    name: Validate Python build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compile Python sources
        run: python -m compileall -q app.py evaluation offline_inference tests

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Audit runtime and test dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt requirements-dev.txt

  container-security:
    name: Container build, scan and SBOM
    needs:
      - quality
      - test
      - build
      - dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IMAGE_REF: hse-signlanguage-ml:ci-${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build container image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          push: false
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha,scope=ml
          cache-to: type=gha,mode=max,scope=ml
          provenance: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0
          cache: true

      - name: Scan Dockerfile configuration
        run: >-
          trivy config --severity HIGH,CRITICAL --exit-code 1
          --skip-version-check Dockerfile

      - name: Scan image for high and critical findings
        run: >-
          trivy image --scanners vuln,secret --severity HIGH,CRITICAL
          --exit-code 1 --ignore-unfixed --no-progress --skip-version-check "${IMAGE_REF}"

      - name: Generate CycloneDX SBOM
        id: sbom
        if: ${{ always() && steps.image.outcome == 'success' }}
        run: >-
          trivy image --format cyclonedx --output sbom.cdx.json
          --no-progress --skip-version-check "${IMAGE_REF}"

      - name: Upload SBOM
        if: ${{ always() && steps.sbom.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ml-sbom
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 14
