name: Production video smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Explicit backend API base URL (this sends real traffic)
        required: true
        type: string
      mode:
        description: Path to exercise
        required: true
        default: both
        type: choice
        options:
          - both
          - upload
          - websocket

permissions:
  contents: read

concurrency:
  group: production-video-smoke
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  replay:
    name: Replay official Slovo video
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install smoke dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Download and verify the pinned Slovo sample
        run: >-
          python -m evaluation.evaluate_slovo
          --download-only --videos-only
          --sample-id 251e3c58-90f9-4ef1-8292-250b76a88aaa

      - name: Replay upload and live paths
        env:
          SMOKE_MODE: ${{ inputs.mode }}
          SMOKE_TARGET_URL: ${{ inputs.target_url }}
        run: >-
          python -m evaluation.replay_stack
          --base-url "${SMOKE_TARGET_URL}"
          --video .cache/model-evaluation/slovo-test/251e3c58-90f9-4ef1-8292-250b76a88aaa.mp4
          --mode "${SMOKE_MODE}"
          --expected день
          --require-enhanced
